name: R Testthat Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true # Installs fast, pre-compiled Linux binary packages

      # Automatically resolves, installs, and caches all requested R packages safely
      - name: Install and Cache R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::data.table
            any::dplyr
            any::tidyr
            any::xgboost
            any::caret
            any::testthat
            any::here

      - name: Execute Test Suite
        run: |
          Rscript -e "testthat::test_dir('tests/testthat')"

      # Strips out old badge contents and reads the fresh passing metrics
      - name: Update Live Badges in README
        if: success()
        run: |
          # Replace old anchors with the newly calculated badges
          sed -i '/<!-- START_BADGES -->/,/<!-- END_BADGES -->/{//!d}' README.md
          sed -i '/<!-- START_BADGES -->/r tests/live_badges.md' README.md

      # Pushes changes safely back to the default branch without triggering infinite loop builds
      - name: Commit Updates
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md tests/metrics.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update test pass badges [skip ci]" && git push)
