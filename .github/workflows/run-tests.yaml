name: R Testthat Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true # Installs fast, pre-compiled Linux binary packages

      # Automatically resolves, installs, and caches all requested R packages safely
      - name: Install and Cache R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::data.table
            any::dplyr
            any::tidyr
            deps::xgboost@1.7.9-1
            deps::caret@7.0-1
            any::testthat
            any::here

      - name: Execute Test Suite
        run: |
          Rscript -e "testthat::test_dir('tests/testthat')"
